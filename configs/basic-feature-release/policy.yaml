# Generated from contribution.md. Do not edit by hand.
version: 1
source:
  file: "contribution.md"
  format: "mermaid.gitGraph"
branches:
  long_lived:
    - "main"
    - "dev"
  families:
    - "feat/*"
    - "release/*"
    - "hotfix/*"
protected_refs:
  - "refs/heads/dev"
  - "refs/heads/main"
branch_from:
  -
    source: "main"
    target: "dev"
    source_ref: "refs/heads/main"
    target_ref: "refs/heads/dev"
    target_ref_regex: "^refs/heads/dev$"
  -
    source: "dev"
    target: "feat/*"
    source_ref: "refs/heads/dev"
    target_ref: "refs/heads/feat/*"
    target_ref_regex: "^refs/heads/feat/.+$"
  -
    source: "dev"
    target: "release/*"
    source_ref: "refs/heads/dev"
    target_ref: "refs/heads/release/*"
    target_ref_regex: "^refs/heads/release/.+$"
  -
    source: "main"
    target: "hotfix/*"
    source_ref: "refs/heads/main"
    target_ref: "refs/heads/hotfix/*"
    target_ref_regex: "^refs/heads/hotfix/.+$"
merge_rules:
  -
    source: "feat/*"
    target: "dev"
    id: "feat/* to dev"
    source_ref: "refs/heads/feat/*"
    source_ref_regex: "^refs/heads/feat/.+$"
    target_ref: "refs/heads/dev"
  -
    source: "release/*"
    target: "dev"
    id: "release/* to dev"
    source_ref: "refs/heads/release/*"
    source_ref_regex: "^refs/heads/release/.+$"
    target_ref: "refs/heads/dev"
  -
    source: "release/*"
    target: "main"
    id: "release/* to main"
    source_ref: "refs/heads/release/*"
    source_ref_regex: "^refs/heads/release/.+$"
    target_ref: "refs/heads/main"
    tag_pattern: "v#.#.0"
    tag_tokens:
      - "#"
      - "#"
      - "0"
    tag_ref: "refs/tags/v#.#.0"
    tag_ref_regex: "^refs/tags/v[0-9]+\\.[0-9]+\\.0$"
  -
    source: "hotfix/*"
    target: "dev"
    id: "hotfix/* to dev"
    source_ref: "refs/heads/hotfix/*"
    source_ref_regex: "^refs/heads/hotfix/.+$"
    target_ref: "refs/heads/dev"
  -
    source: "hotfix/*"
    target: "main"
    id: "hotfix/* to main"
    source_ref: "refs/heads/hotfix/*"
    source_ref_regex: "^refs/heads/hotfix/.+$"
    target_ref: "refs/heads/main"
    tag_pattern: "v=.=.#"
    tag_tokens:
      - "="
      - "="
      - "#"
    tag_ref: "refs/tags/v=.=.#"
    tag_ref_regex: "^refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+$"
required_targets:
  -
    source: "feat/*"
    source_ref: "refs/heads/feat/*"
    source_ref_regex: "^refs/heads/feat/.+$"
    targets:
      - "dev"
    target_refs:
      - "refs/heads/dev"
  -
    source: "release/*"
    source_ref: "refs/heads/release/*"
    source_ref_regex: "^refs/heads/release/.+$"
    targets:
      - "dev"
      - "main"
    target_refs:
      - "refs/heads/dev"
      - "refs/heads/main"
  -
    source: "hotfix/*"
    source_ref: "refs/heads/hotfix/*"
    source_ref_regex: "^refs/heads/hotfix/.+$"
    targets:
      - "dev"
      - "main"
    target_refs:
      - "refs/heads/dev"
      - "refs/heads/main"
tag_rules:
  -
    source: "release/*"
    target: "main"
    tag_pattern: "v#.#.0"
    tag_tokens:
      - "#"
      - "#"
      - "0"
    tag_ref: "refs/tags/v#.#.0"
    tag_ref_regex: "^refs/tags/v[0-9]+\\.[0-9]+\\.0$"
  -
    source: "hotfix/*"
    target: "main"
    tag_pattern: "v=.=.#"
    tag_tokens:
      - "="
      - "="
      - "#"
    tag_ref: "refs/tags/v=.=.#"
    tag_ref_regex: "^refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+$"
